<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Sandla</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-lg mx-auto bg-white p-6 rounded-3xl shadow-sm border">
        <h2 class="text-2xl font-black mb-6">Painel Sandla</h2>

        <button onclick="document.getElementById('secao-h').classList.toggle('hidden')" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-bold mb-4">🕒 EDITAR HORÁRIOS</button>
        <div id="secao-h" class="hidden space-y-2 mb-8 p-4 bg-slate-50 rounded-2xl border">
            <div id="grade-horarios"></div>
            <button id="btn-salvar-horarios" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold mt-2">SALVAR HORÁRIOS</button>
        </div>

        <form id="form-produto" class="space-y-4 border-t pt-6">
            <input type="hidden" id="edit-id">
            <input type="text" id="nome" placeholder="Nome do Produto" class="w-full p-3 border rounded-xl" required>
            <input type="number" step="0.01" id="preco" placeholder="Preço R$" class="w-full p-3 border rounded-xl" required>
            <input type="file" id="imagemFile" accept="image/*" class="w-full text-sm">
            <img id="img-preview" src="" class="hidden h-32 mx-auto rounded-lg">
            <label class="flex items-center gap-2 font-bold"><input type="checkbox" id="emEstoque" checked> Em estoque</label>
            <button type="submit" id="btn-submit" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl">SALVAR ITEM</button>
        </form>

        <div id="admin-lista-produtos" class="mt-8 space-y-2"></div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
