<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Sandla</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 pb-20">
    <div class="max-w-lg mx-auto bg-white p-6 rounded-3xl shadow-sm border">
        <h2 class="text-2xl font-black mb-6">Painel Sandla</h2>

        <button onclick="document.getElementById('secao-h').classList.toggle('hidden')" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-bold mb-4 text-xs">🕒 EDITAR HORÁRIOS</button>
        <div id="secao-h" class="hidden space-y-2 mb-8 p-4 bg-slate-50 rounded-2xl border text-xs">
            <div id="grade-horarios"></div>
            <button id="btn-salvar-horarios" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold mt-2">SALVAR HORÁRIOS</button>
        </div>

        <form id="form-produto" class="space-y-4 border-t pt-6">
            <input type="hidden" id="edit-id">
            <input type="text" id="nome" placeholder="Nome do lanche" class="w-full p-3 border rounded-xl" required>
            <textarea id="descricao" placeholder="Descrição / Ingredientes" class="w-full p-3 border rounded-xl h-20"></textarea>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" step="0.01" id="preco" placeholder="Preço Normal R$" class="p-3 border rounded-xl" required>
                <input type="number" step="0.01" id="precoPromo" placeholder="Preço Promo R$ (Opcional)" class="p-3 border rounded-xl">
            </div>
            <div class="p-4 bg-slate-50 border-2 border-dashed rounded-xl text-center">
                <input type="file" id="imagemFile" accept="image/*" class="text-xs">
                <img id="img-preview" src="" class="hidden h-32 mx-auto mt-4 rounded-lg shadow-sm">
            </div>
            <label class="flex items-center gap-2 font-bold text-sm"><input type="checkbox" id="emEstoque" checked> Em estoque</label>
            <button type="submit" id="btn-submit" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl shadow-md">SALVAR PRODUTO</button>
        </form>

        <div id="admin-lista-produtos" class="mt-8 space-y-2"></div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>s
