<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sandla | Cardápio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        body { font-family: 'Lexend', sans-serif; background-color: #fffaf5; padding-bottom: 120px; }
        .food-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .food-card { background: white; border-radius: 18px; overflow: hidden; border: 1px solid #f3f4f6; display: flex; flex-direction: column; }
        .food-card img { width: 100%; height: 110px; object-fit: cover; background: #eee; }
        #carrinho-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; background: #1e293b; color: white; padding: 16px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: flex-end; }
        .modal-content { background: white; width: 100%; border-radius: 25px 25px 0 0; padding: 24px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md p-4 border-b flex justify-between items-center">
        <h1 class="text-2xl font-black text-orange-600">sandla.</h1>
        <div id="loja-status-header"></div>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">
        <input type="text" id="inputBusca" placeholder="Buscar no cardápio..." class="w-full p-4 rounded-2xl border mb-6 outline-none focus:ring-2 focus:ring-orange-500">
        <div id="alerta-fechado" class="hidden bg-red-50 border border-red-100 p-4 rounded-2xl text-center mb-6 text-red-600 font-bold text-xs"></div>
        <div id="lista-produtos" class="food-grid"></div>
    </main>

    <div id="carrinho-bar" class="hidden">
        <div>
            <p id="cart-count" class="text-[10px] text-slate-400 font-bold uppercase">0 ITENS</p>
            <p id="cart-total" class="text-lg font-black text-orange-400">R$ 0,00</p>
        </div>
        <button onclick="window.abrirCheckout()" class="bg-orange-500 px-6 py-3 rounded-xl font-bold text-sm">VER CARRINHO</button>
    </div>

    <div id="modal-checkout" class="modal" onclick="if(event.target == this) window.fecharCheckout()">
        <div class="modal-content">
            <h2 class="text-xl font-black mb-4">Finalizar Pedido</h2>
            <div id="itens-checkout" class="space-y-3 mb-6 border-b pb-4"></div>
            <div class="space-y-3">
                <input type="text" id="order-nome" placeholder="Seu Nome" class="w-full p-3 border rounded-xl bg-slate-50">
                <input type="text" id="order-rua" placeholder="Endereço (Rua, Nº, Bairro)" class="w-full p-3 border rounded-xl bg-slate-50">
                <input type="text" id="order-ref" placeholder="Ponto de Referência" class="w-full p-3 border rounded-xl bg-slate-50">
            </div>
            <button onclick="window.finalizarPedido()" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl mt-6 shadow-lg text-sm">ENVIAR WHATSAPP</button>
            <button onclick="window.fecharCheckout()" class="w-full text-slate-400 font-bold py-2 mt-2 text-sm">VOLTAR</button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
