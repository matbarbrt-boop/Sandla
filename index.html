<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sandla | Cardápio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        body { font-family: 'Lexend', sans-serif; background-color: #fffaf5; }
        .food-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .food-card { background: white; border-radius: 18px; overflow: hidden; border: 1px solid #f3f4f6; display: flex; flex-direction: column; height: 100%; }
        .food-card img { width: 100%; height: 110px; object-fit: cover; background: #eee; }
        .btn-order { background: #f97316; color: white; font-weight: 700; width: 100%; padding: 10px; border-radius: 12px; font-size: 13px; transition: 0.2s; }
        .btn-order:disabled { background: #d1d5db; cursor: not-allowed; opacity: 0.8; }
    </style>
</head>
<body class="pb-20">
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md p-4 border-b flex justify-between items-center">
        <h1 class="text-2xl font-black text-orange-600">sandla.</h1>
        <div id="loja-status-header"></div>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">
        <input type="text" id="inputBusca" placeholder="O que vamos comer hoje?" class="w-full p-4 rounded-2xl border mb-6 outline-none focus:ring-2 focus:ring-orange-500 shadow-sm">
        
        <div id="alerta-fechado" class="hidden bg-red-50 border border-red-100 p-4 rounded-2xl text-center mb-6">
            <p class="text-red-600 font-bold text-xs" id="texto-horario-retorno"></p>
        </div>

        <div id="lista-produtos" class="food-grid">
            </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
